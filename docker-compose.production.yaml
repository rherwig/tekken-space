version: '3.8'

services:
    database:
        image: postgres
        env_file: ./.env.production
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - /var/tekken/data:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    frontend:
        image: rherwig/tekken-space:latest
        env_file: ./.env.production
        depends_on:
            - database
        environment:
            - ORIGIN=${ORIGIN}
            - DATABASE_URL=${PRISMA_CONNECTION_STRING}
        volumes:
            - /var/tekken/frontend/.env:/app/.env

    proxy:
        image: rherwig/tekken-space-proxy:latest
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/tekken/proxy:/data
        depends_on:
            - database
            - frontend
